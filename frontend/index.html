<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- AUTH -->
    <div id="auth-screen">
        <div class="auth-box">
            <p class="auth-title">// CHAT — accesso</p>
            <div class="auth-tabs">
                <span class="auth-tab active" onclick="switchTab('login')">login</span>
                <span class="auth-tab" onclick="switchTab('register')">registrati</span>
            </div>
            <div class="auth-field">
                <label>USERNAME</label>
                <input type="text" id="auth-username" placeholder="il tuo nome" maxlength="30">
            </div>
            <div class="auth-field">
                <label>PASSWORD</label>
                <input type="password" id="auth-password" placeholder="••••••••">
            </div>
            <div class="auth-field" id="color-field" style="display:none">
                <label>COLORE NOME</label>
                <input type="color" id="auth-color" value="#e8c547" style="width:100%;height:36px;padding:2px">
            </div>
            <button class="auth-btn" onclick="doAuth()">accedi</button>
            <p class="auth-error" id="auth-error"></p>
        </div>
    </div>
    <!-- APP -->
    <div id="app-screen">
        <header>
            <div class="header-left">
                <span class="header-title">// CHAT</span>
                <span class="header-room" id="header-room">#generale</span>
                <span class="status-dot"></span>
            </div>
            <div class="header-right">
                <span class="header-user" id="header-user"></span>
                <button class="theme-btn" onclick="toggleTheme()" title="tema">◑</button>
                <button class="logout-btn" onclick="logout()">esci</button>
            </div>
        </header>

        <div class="app-layout">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="sidebar-header">canali</div>
                <div class="room-list" id="room-list"></div>
                <div class="new-room">
                    <input type="text" id="new-room-input" placeholder="+ nuovo canale" maxlength="30"
                        onkeydown="if(event.key==='Enter') createRoom()">
                </div>
                <div class="online-panel">
                    <div class="online-title">online</div>
                    <div id="online-list"></div>
                </div>
            </div>

            <!-- CHAT -->
            <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
                <div id="messages">
                    <p class="empty" id="empty-msg">nessun messaggio ancora</p>
                </div>

                <footer>
                    <p class="markdown-hint">
                        <span>**grassetto**</span> &nbsp;
                        <span>*corsivo*</span> &nbsp;
                        <span>`codice`</span> &nbsp;
                        <span>~~barrato~~</span>
                    </p>

                    <div class="input-row">
                        <textarea id="msg-input" placeholder="scrivi un messaggio... (Enter per inviare)"></textarea>
                        <button id="send-btn" onclick="sendMessage()">invia</button>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
